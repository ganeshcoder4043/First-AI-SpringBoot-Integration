spring.application.name=first-springboot-ai

# Server configuration
server.port=8080

# ===== OLLAMA CONFIGURATION =====
# Ollama server URL (default)
spring.ai.ollama.base-url=http://localhost:11434

# Default chat model
spring.ai.ollama.chat.options.model=llama3.2:1b

# Temperature (0.0 to 1.0) - controls creativity
spring.ai.ollama.chat.options.temperature=0.7

# Top P (nucleus sampling)
spring.ai.ollama.chat.options.topP=0.9

# Max tokens in response
spring.ai.ollama.chat.options.numPredict=2048

# ===== OPENAI CONFIGURATION (IF USING) =====
# spring.ai.openai.api-key=${OPENAI_API_KEY}
# spring.ai.openai.chat.options.model=gpt-4
# spring.ai.openai.chat.options.temperature=0.7

# ===== LOGGING =====
logging.level.org.springframework.ai=DEBUG
logging.level.com.springbootai=DEBUG

# ===== DISABLE UNWANTED PROVIDERS =====
spring.ai.openai.enabled=false